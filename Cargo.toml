[package]
name = "sb"
version = "0.4.0"
edition = "2021"

[dependencies]
# ── Solana ────────────────────────────────────────────────────────────
# Keep all directly used Solana data-model crates on the same family as
# solana-client to avoid duplicate VersionedTransaction / solana_transaction
# types in the graph.
solana-client = "=3.1.11"
solana-sdk = "=3.0.0"
solana-transaction-status = "=3.1.11"
solana-message = "=3.0.1"

# Interface / helper crates used directly by the off-chain client.
solana-compute-budget-interface = "3.0"
solana-commitment-config = "3.1"
solana-address-lookup-table-interface = "3.0.1"
solana-system-interface = { version = "3", features = ["bincode"] }

# ── Yellowstone gRPC (Geyser streaming) ──────────────────────────────
yellowstone-grpc-client = "12.2"
yellowstone-grpc-proto = "12.1"

# ── Async runtime + networking ───────────────────────────────────────
tokio = { version = "1", features = ["full"] }
futures = "0.3"
tonic = "0.14"
reqwest = { version = "0.13.2", default-features = false, features = ["json", "rustls", "stream", "query"] }

# ── Serialization ────────────────────────────────────────────────────
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bs58 = "0.5"
base64 = "0.22"

# Solana/Jito transaction wire format — MUST be bincode 1.x (fixed-width LE).
# bincode 2.x uses varint encoding; Jito rejects varint-encoded bundles silently.
bincode1 = { package = "bincode", version = "=1.3.3" }

# ── CLI / Config ─────────────────────────────────────────────────────
clap = { version = "4", features = ["derive", "env"] }
dotenvy = "0.15"

# ── Logging / Tracing ────────────────────────────────────────────────
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# ── Error handling ───────────────────────────────────────────────────
anyhow = "1"

# ── Misc ─────────────────────────────────────────────────────────────
dashmap = "6"
tokio-util = "0.7"
rand = "0.10"

# ── TUI Dashboard ────────────────────────────────────────────────────
ratatui = "0.30"
crossterm = "0.29"

[profile.release]
opt-level = 3
lto = "thin"
strip = true
codegen-units = 1
panic = "abort"

[profile.dev]
opt-level = 1
